name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # DEXSCREENER_PAIR_URL defaults to the canonical SNAP/ETH pair when unset.
          # Explicitly pass it here so CI mirrors production configuration.
          DEXSCREENER_PAIR_URL: ${{ vars.DEXSCREENER_PAIR_URL || '' }}
