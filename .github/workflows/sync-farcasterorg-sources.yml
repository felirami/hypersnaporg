name: Sync Farcasterorg sources

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync source snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Farcasterorg source snapshot
        run: npm run sync:sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Commit source snapshot
        run: |
          if git diff --quiet -- src/data/farcasterorg-sources.json; then
            echo "No source snapshot changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/farcasterorg-sources.json
          git commit -m "chore: sync farcasterorg source snapshot"
          git push origin HEAD:main
