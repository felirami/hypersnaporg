name: Sync Farcasterorg sources

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync source snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Farcasterorg source snapshot
        run: npm run sync:sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sync/farcasterorg-sources
          delete-branch: true
          title: "chore: sync farcasterorg source snapshot"
          commit-message: "chore: sync farcasterorg source snapshot"
          body: |
            Automated update of `src/data/farcasterorg-sources.json` from the scheduled source sync.

            Validates with lint, typecheck, and build before opening this PR.
          add-paths: |
            src/data/farcasterorg-sources.json
